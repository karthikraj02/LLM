version: '3.8'

services:
  llm-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./lora-adapters:/app/lora-adapters
    # Enable GPU for vLLM and Training
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: '16gb' # Required for vLLM / PyTorch multi-processing
